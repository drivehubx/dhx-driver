const LoginPage=({onLogin,onRegister})=>{
  const [email,setEmail]=React.useState("");
  const [pw,setPw]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState("");
  const login=async()=>{
    if(!email||!pw) return setErr("Please fill in all fields");
    setLoading(true);setErr("");
    const{data,error}=await sb.auth.signInWithPassword({email,password:pw});
    if(error) setErr(error.message);
    else onLogin(data.user);
    setLoading(false);
  };
  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",padding:24}}>
      <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{fontSize:48,marginBottom:12}}>🚗</div>
          <div style={{fontSize:26,fontWeight:800,color:C.text}}>DHX Driver</div>
          <div style={{fontSize:13,color:C.muted,marginTop:4}}>Sign in to your account</div>
        </div>
        {err&&<div style={{background:C.red+"20",border:`1px solid ${C.red}40`,borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,color:C.red}}>{err}</div>}
        <Field label="Email"><input style={inp} value={email} onChange={e=>setEmail(e.target.value)} placeholder="your@email.com" type="email"/></Field>
        <Field label="Password"><input style={inp} value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" type="password" onKeyDown={e=>e.key==="Enter"&&login()}/></Field>
        <button onClick={login} disabled={loading} style={{width:"100%",background:C.green,border:"none",borderRadius:14,padding:16,color:"#000",fontSize:16,fontWeight:700,marginTop:8,opacity:loading?0.7:1}}>
          {loading?"Signing in...":"Sign In →"}
        </button>
        <div style={{textAlign:"center",marginTop:20}}>
          <span style={{color:C.muted,fontSize:14}}>New driver? </span>
          <button onClick={onRegister} style={{background:"none",border:"none",color:C.green,fontSize:14,fontWeight:600}}>Register here</button>
        </div>
      </div>
    </div>
  );
};

// ── DOCUMENT UPLOAD STEP ──
const DocUploadStep=({onDone})=>{
  const [icFile,setIcFile]=React.useState(null);
  const [licFile,setLicFile]=React.useState(null);
  const [icPreview,setIcPreview]=React.useState(null);
  const [licPreview,setLicPreview]=React.useState(null);

  const handleIC=e=>{
    const f=e.target.files[0];
    if(f){setIcFile(f);setIcPreview(URL.createObjectURL(f));}
  };
  const handleLic=e=>{
    const f=e.target.files[0];
    if(f){setLicFile(f);setLicPreview(URL.createObjectURL(f));}
  };

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",paddingBottom:120}}>
      <div style={{background:`linear-gradient(135deg,#0A1628,#0F2040)`,padding:"48px 24px 24px"}}>
        <div style={{fontSize:22,fontWeight:800,color:C.text}}>Upload Documents</div>
        <div style={{fontSize:13,color:C.muted,marginTop:4}}>Upload IC and driving licence for verification</div>
      </div>
      <div style={{padding:"20px 20px 0"}}>
        <div style={{background:C.yellow+"15",border:`1px solid ${C.yellow}30`,borderRadius:12,padding:14,marginBottom:20}}>
          <div style={{fontSize:12,color:C.yellow}}>⏳ Your account will be reviewed by DHX admin within 24 hours.</div>
        </div>

        {/* IC Upload */}
        <div style={{background:C.card,border:`1px solid ${icFile?C.green:C.border}`,borderRadius:16,padding:20,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:C.text}}>🪪 MyKad (IC)</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>Front side of your IC</div>
            </div>
            {icFile&&<span style={{color:C.green,fontSize:12,fontWeight:700}}>✓ Uploaded</span>}
          </div>
          {icPreview&&<img src={icPreview} style={{width:"100%",borderRadius:10,marginBottom:12,maxHeight:160,objectFit:"cover"}}/>}
          <label style={{display:"block",background:"#0A1020",border:`1px dashed ${icFile?C.green:C.border}`,borderRadius:12,padding:20,textAlign:"center",cursor:"pointer"}}>
            <input type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={handleIC}/>
            <div style={{fontSize:24,marginBottom:6}}>{icFile?"📸":"📤"}</div>
            <div style={{fontSize:13,color:icFile?C.green:C.muted}}>{icFile?"Change photo":"Take photo or upload from gallery"}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Supports: JPG, PNG, PDF (MyJPJ digital IC)</div>
          </label>
        </div>

        {/* Licence Upload */}
        <div style={{background:C.card,border:`1px solid ${licFile?C.green:C.border}`,borderRadius:16,padding:20,marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:C.text}}>🚗 Driving Licence</div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>Front side of your licence</div>
            </div>
            {licFile&&<span style={{color:C.green,fontSize:12,fontWeight:700}}>✓ Uploaded</span>}
          </div>
          {licPreview&&<img src={licPreview} style={{width:"100%",borderRadius:10,marginBottom:12,maxHeight:160,objectFit:"cover"}}/>}
          <label style={{display:"block",background:"#0A1020",border:`1px dashed ${licFile?C.green:C.border}`,borderRadius:12,padding:20,textAlign:"center",cursor:"pointer"}}>
            <input type="file" accept="image/*,.pdf" style={{display:"none"}} onChange={handleLic}/>
            <div style={{fontSize:24,marginBottom:6}}>{licFile?"📸":"📤"}</div>
            <div style={{fontSize:13,color:licFile?C.green:C.muted}}>{licFile?"Change photo":"Take photo or upload from gallery"}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:4}}>Supports: JPG, PNG, PDF (MyJPJ digital licence)</div>
          </label>
        </div>

        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:14}}>
          <div style={{fontSize:12,color:C.muted}}>🔒 Documents are encrypted and only visible to DHX admin for verification.</div>
        </div>
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"16px 20px 40px",background:C.bg,borderTop:`1px solid ${C.border}`}}>
        <button onClick={()=>onDone({icFile,licFile})} disabled={!icFile||!licFile} style={{width:"100%",background:icFile&&licFile?C.green:"#1A2744",border:"none",borderRadius:14,padding:16,color:icFile&&licFile?"#000":C.muted,fontSize:15,fontWeight:700}}>
          {icFile&&licFile?"Submit Documents ✓":"Upload both IC and Licence first"}
        </button>
        <button onClick={()=>onDone({icFile:null,licFile:null})} style={{width:"100%",background:"none",border:"none",color:C.muted,fontSize:13,marginTop:12}}>
          Skip for now (upload later in Profile)
        </button>
      </div>
    </div>
  );
};

const RegisterPage=({onBack,onSuccess})=>{
  const [step,setStep]=React.useState(1);
  const [loading,setLoading]=React.useState(false);
  const [err,setErr]=React.useState("");
  const [f,setF]=React.useState({
    full_name:"",phone:"",email:"",password:"",confirm_password:"",
    ic_number:"",license_number:"",license_expiry:"",grab_id:"",
    emergency_contact_name:"",emergency_contact_phone:"",
  });
  const s=(k,v)=>setF(x=>({...x,[k]:v}));

  const next=()=>{
    setErr("");
    if(step===1){
      if(!f.full_name||!f.phone||!f.email||!f.password) return setErr("Please fill in all fields");
      if(f.password!==f.confirm_password) return setErr("Passwords do not match");
      if(f.password.length<8) return setErr("Password must be at least 8 characters");
    }
    if(step===2){if(!f.ic_number||!f.license_number) return setErr("IC and license number required");}
    setStep(x=>x+1);
  };

  const register=async({icFile,licFile})=>{
    setLoading(true);setErr("");
    const{data,error}=await sb.auth.signUp({email:f.email,password:f.password});
    if(error){setErr(error.message);setLoading(false);return;}
    const uid=data.user.id;
    await sb.from("profiles").insert([{id:uid,full_name:f.full_name,phone:f.phone,role:"driver"}]);

    let ic_front_url=null,license_front_url=null;
    if(icFile){
      const ext=icFile.name.split(".").pop()||"jpg";
      const{data:d}=await sb.storage.from("driver-documents").upload(`${uid}/ic_front.${ext}`,icFile,{upsert:true});
      ic_front_url=d?.path||null;
    }
    if(licFile){
      const ext=licFile.name.split(".").pop()||"jpg";
      const{data:d}=await sb.storage.from("driver-documents").upload(`${uid}/license_front.${ext}`,licFile,{upsert:true});
      license_front_url=d?.path||null;
    }

    await sb.from("drivers").insert([{
      profile_id:uid,ic_number:f.ic_number,license_number:f.license_number,
      license_expiry:f.license_expiry||null,grab_id:f.grab_id||null,
      emergency_contact_name:f.emergency_contact_name||null,
      emergency_contact_phone:f.emergency_contact_phone||null,
      status:"active",verification_status:"pending",
      ic_front_url,license_front_url,
    }]);
    setLoading(false);
    onSuccess();
  };

  if(step===4) return <DocUploadStep onDone={register}/>;

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",paddingBottom:100}}>
      <div style={{padding:"20px 24px 0",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>step===1?onBack():setStep(x=>x-1)} style={{background:"none",border:"none",color:C.muted,fontSize:22,padding:4}}>←</button>
        <div>
          <div style={{fontSize:16,fontWeight:700,color:C.text}}>Create Account</div>
          <div style={{fontSize:12,color:C.muted}}>Step {step} of 3</div>
        </div>
      </div>
      <div style={{padding:"14px 24px 0",display:"flex",gap:6}}>
        {[1,2,3].map(i=><div key={i} style={{flex:1,height:4,borderRadius:2,background:i<=step?C.green:C.border}}/>)}
      </div>
      <div style={{flex:1,padding:"20px 24px 0",overflowY:"auto"}}>
        {err&&<div style={{background:C.red+"20",border:`1px solid ${C.red}40`,borderRadius:12,padding:"12px 16px",marginBottom:16,fontSize:13,color:C.red}}>{err}</div>}
        {step===1&&(
          <div>
            <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4}}>Personal Info</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Tell us about yourself</div>
            <Field label="Full Name (as per IC)"><input style={inp} value={f.full_name} onChange={e=>s("full_name",e.target.value)} placeholder="As per IC"/></Field>
            <Field label="Phone Number"><input style={inp} value={f.phone} onChange={e=>s("phone",e.target.value)} placeholder="+60 12 345 6789" type="tel"/></Field>
            <Field label="Email"><input style={inp} value={f.email} onChange={e=>s("email",e.target.value)} placeholder="your@email.com" type="email"/></Field>
            <Field label="Password"><input style={inp} value={f.password} onChange={e=>s("password",e.target.value)} placeholder="Min 8 characters" type="password"/></Field>
            <Field label="Confirm Password"><input style={inp} value={f.confirm_password} onChange={e=>s("confirm_password",e.target.value)} placeholder="Re-enter password" type="password"/></Field>
          </div>
        )}
        {step===2&&(
          <div>
            <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4}}>Driver Details</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Your driving credentials</div>
            <Field label="IC Number"><input style={inp} value={f.ic_number} onChange={e=>s("ic_number",e.target.value)} placeholder="e.g. 901231131234"/></Field>
            <Field label="License Number"><input style={inp} value={f.license_number} onChange={e=>s("license_number",e.target.value)} placeholder="e.g. H1234567"/></Field>
            <Field label="License Expiry"><input style={inp} value={f.license_expiry} onChange={e=>s("license_expiry",e.target.value)} type="date"/></Field>
            <Field label="Grab / Maxim ID (optional)"><input style={inp} value={f.grab_id} onChange={e=>s("grab_id",e.target.value)} placeholder="Your e-hailing ID"/></Field>
          </div>
        )}
        {step===3&&(
          <div>
            <div style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4}}>Emergency Contact</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:20}}>Who to contact in emergency?</div>
            <Field label="Contact Name"><input style={inp} value={f.emergency_contact_name} onChange={e=>s("emergency_contact_name",e.target.value)} placeholder="Full name"/></Field>
            <Field label="Contact Phone"><input style={inp} value={f.emergency_contact_phone} onChange={e=>s("emergency_contact_phone",e.target.value)} placeholder="+60 12 345 6789" type="tel"/></Field>
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:16,marginTop:8}}>
              <div style={{fontSize:12,color:C.muted,marginBottom:8}}>By registering, you agree to the DHX Driver Agreement and consent to PDPA data collection.</div>
              <div style={{fontSize:12,color:C.green}}>✓ DRIVEHUBX SDN. BHD. · Kuching, Sarawak</div>
            </div>
          </div>
        )}
      </div>
      <div style={{padding:"16px 24px 40px",background:C.bg}}>
        {step<3?(
          <button onClick={next} style={{width:"100%",background:C.green,border:"none",borderRadius:14,padding:16,color:"#000",fontSize:16,fontWeight:700}}>Continue →</button>
        ):(
          <button onClick={()=>setStep(4)} style={{width:"100%",background:C.green,border:"none",borderRadius:14,padding:16,color:"#000",fontSize:16,fontWeight:700}}>
            Next: Upload Documents →
          </button>
        )}
      </div>
    </div>
  );
};

const DriverApp=({user,onLogout})=>{
  const [page,setPage]=React.useState("home");
  const [profile,setProfile]=React.useState(null);
  const [driver,setDriver]=React.useState(null);
  const [rentals,setRentals]=React.useState([]);
  const [payments,setPayments]=React.useState([]);
  const [loading,setLoading]=React.useState(true);

  React.useEffect(()=>{fetchData();},[]);

  const fetchData=async()=>{
    setLoading(true);
    const[p,d]=await Promise.all([
      sb.from("profiles").select("*").eq("id",user.id).single(),
      sb.from("drivers").select("*").eq("profile_id",user.id).single(),
    ]);
    setProfile(p.data);setDriver(d.data);
    if(d.data){
      const[r,pay]=await Promise.all([
        sb.from("rentals").select("*,vehicles(plate_number,make,model,color,year)").eq("driver_id",d.data.id).order("created_at",{ascending:false}),
        sb.from("payments").select("*").eq("driver_id",d.data.id).order("payment_date",{ascending:false}),
      ]);
      setRentals(r.data||[]);setPayments(pay.data||[]);
    }
    setLoading(false);
  };

  const activeRental=rentals.find(r=>r.status==="active");
  const pendingPayments=payments.filter(p=>p.status==="pending"||p.status==="overdue");
  const totalPaid=payments.filter(p=>p.status==="paid").reduce((s,p)=>s+Number(p.amount),0);
  const verStatus=driver?.verification_status;
  const verBadge=verStatus==="approved"?{color:C.green,icon:"✅",label:"Verified"}:verStatus==="rejected"?{color:C.red,icon:"❌",label:"Rejected"}:{color:C.yellow,icon:"⏳",label:"Pending Review"};

  if(loading) return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center"}}><div style={{fontSize:32,marginBottom:12}}>🚗</div><div style={{color:C.green,fontSize:14}}>Loading...</div></div>
    </div>
  );

  const navItems=[{id:"home",icon:"🏠",label:"Home"},{id:"rental",icon:"🚗",label:"My Car"},{id:"payments",icon:"💰",label:"Payments"},{id:"profile",icon:"👤",label:"Profile"}];

  return(
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:80}}>
      {verStatus!=="approved"&&(
        <div style={{background:verStatus==="rejected"?C.red+"20":C.yellow+"15",borderBottom:`1px solid ${verStatus==="rejected"?C.red:C.yellow}30`,padding:"10px 20px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{verBadge.icon}</span>
          <span style={{fontSize:12,color:verStatus==="rejected"?C.red:C.yellow,fontWeight:600}}>
            {verStatus==="rejected"?"Documents rejected — "+driver?.verification_notes:"Account pending verification by DHX admin"}
          </span>
        </div>
      )}

      {page==="home"&&(
        <div>
          <div style={{background:`linear-gradient(135deg,#0A1628,#0F2040)`,padding:"32px 24px 28px"}}>
            <div style={{fontSize:13,color:C.muted}}>Good day,</div>
            <div style={{fontSize:22,fontWeight:800,color:C.text,marginTop:2}}>{profile?.full_name||"Driver"} 👋</div>
            {driver?.grab_id&&<div style={{fontSize:12,color:C.green,marginTop:4}}>Grab ID: {driver.grab_id}</div>}
          </div>
          <div style={{padding:"20px 20px 0"}}>
            {activeRental?(
              <div style={{background:`linear-gradient(135deg,${C.green}20,${C.blue}10)`,border:`1px solid ${C.green}40`,borderRadius:16,padding:20,marginBottom:16}}>
                <div style={{fontSize:11,color:C.green,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Active Rental</div>
                <div style={{fontSize:22,fontWeight:800,color:C.text}}>{activeRental.vehicles?.plate_number}</div>
                <div style={{fontSize:14,color:C.muted,marginTop:2}}>{activeRental.vehicles?.make} {activeRental.vehicles?.model} {activeRental.vehicles?.year}</div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:16,paddingTop:16,borderTop:`1px solid ${C.green}20`}}>
                  <div><div style={{fontSize:11,color:C.muted}}>RATE</div><div style={{fontSize:16,fontWeight:700,color:C.green}}>{fRM(activeRental.rate)}/{activeRental.rental_type}</div></div>
                  <div><div style={{fontSize:11,color:C.muted}}>SINCE</div><div style={{fontSize:14,fontWeight:600,color:C.text}}>{fDate(activeRental.start_date)}</div></div>
                </div>
              </div>
            ):(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:24,marginBottom:16,textAlign:"center"}}>
                <div style={{fontSize:32,marginBottom:8}}>🚗</div>
                <div style={{fontSize:14,color:C.muted}}>No active rental</div>
                <div style={{fontSize:12,color:C.muted,marginTop:4}}>Contact DHX admin to get started</div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:14,padding:16}}>
                <div style={{fontSize:20}}>💰</div>
                <div style={{fontSize:20,fontWeight:800,color:C.yellow,marginTop:6}}>{fRM(totalPaid)}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>Total Paid</div>
              </div>
              <div style={{background:C.card,border:`1px solid ${pendingPayments.length>0?C.red:C.border}`,borderRadius:14,padding:16}}>
                <div style={{fontSize:20}}>⚠️</div>
                <div style={{fontSize:20,fontWeight:800,color:pendingPayments.length>0?C.red:C.green,marginTop:6}}>{pendingPayments.length}</div>
                <div style={{fontSize:11,color:C.muted,marginTop:2}}>Pending</div>
              </div>
            </div>
          </div>
        </div>
      )}

      {page==="rental"&&(
        <div style={{padding:"32px 20px 0"}}>
          <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:20}}>🚗 My Car</div>
          {rentals.length===0?(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:40,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>🚗</div><div style={{color:C.muted,fontSize:14}}>No rental history yet</div></div>
          ):rentals.map(r=>(
            <div key={r.id} style={{background:C.card,border:`1px solid ${r.status==="active"?C.green:C.border}`,borderRadius:16,padding:20,marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div><div style={{fontSize:20,fontWeight:800,color:C.text}}>{r.vehicles?.plate_number}</div><div style={{fontSize:13,color:C.muted}}>{r.vehicles?.make} {r.vehicles?.model} {r.vehicles?.year}</div></div>
                <span style={{background:sColor(r.status)+"20",color:sColor(r.status),border:`1px solid ${sColor(r.status)}40`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700}}>{r.status}</span>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
                <div><div style={{fontSize:10,color:C.muted,marginBottom:3}}>RATE</div><div style={{fontSize:13,fontWeight:600,color:C.green}}>{fRM(r.rate)}/{r.rental_type}</div></div>
                <div><div style={{fontSize:10,color:C.muted,marginBottom:3}}>START</div><div style={{fontSize:12,color:C.text}}>{fDate(r.start_date)}</div></div>
                <div><div style={{fontSize:10,color:C.muted,marginBottom:3}}>END</div><div style={{fontSize:12,color:C.text}}>{fDate(r.end_date)}</div></div>
              </div>
            </div>
          ))}
        </div>
      )}

      {page==="payments"&&(
        <div style={{padding:"32px 20px 0"}}>
          <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:20}}>💰 Payments</div>
          <div style={{background:`linear-gradient(135deg,${C.yellow}15,${C.green}10)`,border:`1px solid ${C.yellow}30`,borderRadius:16,padding:20,marginBottom:20}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:4}}>TOTAL PAID</div><div style={{fontSize:20,fontWeight:800,color:C.green}}>{fRM(totalPaid)}</div></div>
              <div><div style={{fontSize:11,color:C.muted,marginBottom:4}}>PENDING</div><div style={{fontSize:20,fontWeight:800,color:pendingPayments.length>0?C.red:C.green}}>{fRM(pendingPayments.reduce((s,p)=>s+Number(p.amount),0))}</div></div>
            </div>
          </div>
          {payments.length===0?(
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:40,textAlign:"center"}}><div style={{fontSize:40,marginBottom:12}}>💳</div><div style={{color:C.muted,fontSize:14}}>No payment records yet</div></div>
          ):payments.map(p=>(
            <div key={p.id} style={{background:C.card,border:`1px solid ${C.border}`,borderLeft:`3px solid ${sColor(p.status)}`,borderRadius:14,padding:16,marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{fontSize:16,fontWeight:700,color:C.text}}>{fRM(p.amount)}</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>{fDate(p.payment_date)} · {p.payment_method}</div></div>
                <span style={{background:sColor(p.status)+"20",color:sColor(p.status),border:`1px solid ${sColor(p.status)}40`,borderRadius:20,padding:"3px 12px",fontSize:11,fontWeight:700}}>{p.status}</span>
              </div>
            </div>
          ))}
        </div>
      )}

      {page==="profile"&&(
        <div style={{padding:"32px 20px 0"}}>
          <div style={{fontSize:20,fontWeight:800,color:C.text,marginBottom:20}}>👤 Profile</div>
          <div style={{background:C.card,border:`1px solid ${verBadge.color}30`,borderRadius:16,padding:16,marginBottom:14,display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24}}>{verBadge.icon}</span>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:verBadge.color}}>Account {verBadge.label}</div>
              {verStatus==="pending"&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Under review by DHX admin</div>}
              {verStatus==="rejected"&&<div style={{fontSize:11,color:C.red,marginTop:2}}>{driver?.verification_notes||"Please resubmit"}</div>}
            </div>
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:20}}>
              <div style={{width:56,height:56,background:C.green+"20",border:`2px solid ${C.green}40`,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{profile?.full_name?.[0]||"D"}</div>
              <div><div style={{fontSize:17,fontWeight:700,color:C.text}}>{profile?.full_name||"—"}</div><div style={{fontSize:13,color:C.muted}}>{profile?.phone||"—"}</div></div>
            </div>
            {[{label:"IC Number",value:driver?.ic_number},{label:"License Number",value:driver?.license_number},{label:"Grab / Maxim ID",value:driver?.grab_id},{label:"Emergency Contact",value:driver?.emergency_contact_name}].map(item=>(
              <div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{fontSize:12,color:C.muted}}>{item.label}</div>
                <div style={{fontSize:13,color:C.text,fontWeight:500}}>{item.value||"—"}</div>
              </div>
            ))}
          </div>
          <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:20,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>📄 Documents</div>
            {[{label:"IC Front",value:driver?.ic_front_url},{label:"Driving Licence",value:driver?.license_front_url}].map(item=>(
              <div key={item.label} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{fontSize:12,color:C.muted}}>{item.label}</div>
                <div style={{fontSize:12,color:item.value?C.green:C.muted,fontWeight:600}}>{item.value?"✓ Uploaded":"Not uploaded"}</div>
              </div>
            ))}
          </div>
          <button onClick={onLogout} style={{width:"100%",background:"none",border:`1px solid ${C.red}40`,borderRadius:14,padding:14,color:C.red,fontSize:14,fontWeight:600}}>Sign Out</button>
        </div>
      )}

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:50}}>
        {navItems.map(n=>(
          <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,background:"none",border:"none",padding:"12px 0 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <span style={{fontSize:20}}>{n.icon}</span>
            <span style={{fontSize:10,fontWeight:600,color:page===n.id?C.green:C.muted}}>{n.label}</span>
            {page===n.id&&<div style={{width:16,height:2,background:C.green,borderRadius:1}}/>}
          </button>
        ))}
      </div>
    </div>
  );
};

function App(){
  const[state,setState]=React.useState("splash");
  const[user,setUser]=React.useState(null);
  React.useEffect(()=>{
    setTimeout(()=>{
      sb.auth.getSession().then(({data})=>{
        if(data.session){setUser(data.session.user);setState("app");}
        else setState("login");
      });
    },1500);
    sb.auth.onAuthStateChange((_,session)=>{
      if(session){setUser(session.user);setState("app");}
      else{setUser(null);setState("login");}
    });
  },[]);
  if(state==="splash") return <Splash/>;
  if(state==="register") return <RegisterPage onBack={()=>setState("login")} onSuccess={()=>setState("login")}/>;
  if(state==="login") return <LoginPage onLogin={u=>{setUser(u);setState("app");}} onRegister={()=>setState("register")}/>;
  if(state==="app"&&user) return <DriverApp user={user} onLogout={()=>sb.auth.signOut()}/>;
  return <Splash/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
